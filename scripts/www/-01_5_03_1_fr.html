<script>
(function() {
  // 基础缩放功能
  var CW = 1920, CH = 1080;
  var box = document.getElementById('container');
  var loadStatus = document.getElementById('loadStatus');
  function resize() {
    var s = Math.min(window.innerWidth / CW, window.innerHeight / CH);
    box.style.transform = 'scale(' + s + ')';
  }
  window.onresize = resize;
  resize();
  
  // 页面加载完成后，显示所有图层 - 修复Opacity问题
  window.addEventListener('load', function() {
    // 确保所有图层在加载完成后变为可见
    setTimeout(function() {
      var layers = document.querySelectorAll('.layer');
      layers.forEach(function(layer) {
        if (layer.style.opacity === '0') {
          layer.style.opacity = '1'; // 修复：使用显式的'1'而不是空字符串
        }
      });
    }, 100);
  });
  // 智能库加载函数 - 优先本地，失败时使用CDN
  function loadLibrary(src, libraryName, isLocal) {
    return new Promise(function(resolve, reject) {
      console.log('尝试加载 ' + (isLocal ? '本地' : 'CDN') + ' ' + libraryName + ' 库: ' + src);
      loadStatus.textContent = '正在加载 ' + libraryName + ' 库 (' + (isLocal ? '本地' : 'CDN') + ')...';
      var script = document.createElement('script');
      script.src = src;
      script.onload = function() {
        console.log(libraryName + ' 库加载成功 (' + (isLocal ? '本地' : 'CDN') + ')');
        loadStatus.textContent = libraryName + ' 库加载成功';
        setTimeout(function() { loadStatus.textContent = ''; }, 1000);
        resolve(true);
      };
      script.onerror = function() {
        console.warn(libraryName + ' 库加载失败 (' + (isLocal ? '本地' : 'CDN') + '): ' + src);
        reject(new Error('Failed to load ' + libraryName + ' library'));
      };
      document.head.appendChild(script);
    });
  }
  
  // 智能加载动画库 - 优先本地，失败时使用CDN
  function loadAnimationLibraries() {
    var librariesToLoad = [];
    
    // PAG库加载策略：优先本地，备选CDN
    librariesToLoad.push({
      name: 'PAG',
      localSrc: 'lib/libpag.min.js',
      cdnSrc: 'https://cdn.jsdelivr.net/npm/libpag@4.2.36/lib/libpag.min.js',
      required: true
    });
    // Lottie库加载策略：优先本地，备选CDN
    librariesToLoad.push({
      name: 'Lottie',
      localSrc: 'lib/lottie.min.js',
      cdnSrc: 'https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.10.0/lottie.min.js',
      required: true
    });
    
    // 依次尝试加载每个库
    var loadPromises = [];
    for (var i = 0; i < librariesToLoad.length; i++) {
      (function(library) {
        var promise = new Promise(function(resolve) {
          // 首先尝试加载本地库
          loadLibrary(library.localSrc, library.name, true)
            .then(function(success) {
              if (success) resolve(true);
              else throw new Error('本地库加载失败');
            })
            .catch(function() {
              // 本地加载失败，尝试CDN
              console.log('本地' + library.name + '库加载失败，尝试CDN...');
              loadStatus.textContent = '本地库加载失败，尝试CDN...';
              loadLibrary(library.cdnSrc, library.name, false)
                .then(function(success) {
                  if (success) resolve(true);
                  else resolve(false);
                })
                .catch(function() {
                  console.error('所有' + library.name + '库源都加载失败');
                  if (library.required) showLibraryError(library.name);
                  resolve(false);
                });
            });
        });
        loadPromises.push(promise);
      })(librariesToLoad[i]);
    }
    return Promise.allSettled(loadPromises);
    }
  function loadPAGAnimations() {
    console.log('开始加载PAG动画...');
    var pagContainers = document.querySelectorAll('[data-file-type="pag"]');
    if (pagContainers.length === 0) {
      console.log('没有找到PAG容器');
      return;
    }
    console.log('找到' + pagContainers.length + '个PAG容器');
    if (typeof window.libpag === 'undefined') {
      console.error('PAG库未加载');
      showLibraryError('PAG');
      return;
    }
    window.libpag.PAGInit().then(function(PAG) {
      console.log('PAG库初始化成功');
      var promises = [];
      for (var i = 0; i < pagContainers.length; i++) {
        var container = pagContainers[i];
        var canvas = container.querySelector('canvas[data-src]');
        if (canvas) promises.push(loadPAGFile(PAG, canvas, container));
      }
      Promise.allSettled(promises).then(function(results) {
        var successCount = 0, failCount = 0;
        results.forEach(function(result, index) {
          if (result.status === 'fulfilled' && result.value.success) successCount++;
          else { failCount++; console.error('PAG文件加载失败:', result.reason || '未知错误'); }
        });
        console.log('PAG文件加载完成: ' + successCount + ' 个成功, ' + failCount + ' 个失败');
        if (failCount > 0) console.warn('部分PAG文件加载失败，请检查文件是否存在且格式正确');
      });
    }).catch(function(e) {
      console.error('PAG库初始化失败:', e);
      showLibraryError('PAG');
    });
  }
  
  function loadPAGFile(PAG, canvas, container) {
    return new Promise(function(resolve, reject) {
      var src = canvas.getAttribute('data-src');
      var inPoint = parseFloat(canvas.getAttribute('data-in-point')) || 0;
      console.log('加载PAG文件:', src, '入点:', inPoint);
      fetch(src, { method: 'HEAD' }).then(function(response) {
        if (!response.ok) {
          console.warn('PAG文件不存在或无法访问: ' + src);
          showFileError(container, 'PAG文件不存在: ' + src);
        }
        return fetch(src);
      }).then(function(response) {
        if (!response.ok) throw new Error('HTTP错误: ' + response.status);
        return response.arrayBuffer();
      }).then(function(buffer) {
        if (buffer.byteLength < 10) throw new Error('文件大小太小，可能不是有效的PAG文件');
        return PAG.PAGFile.load(buffer);
      }).then(function(pagFile) {
        if (!pagFile) throw new Error('PAG文件加载失败: 返回的对象为空');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        return PAG.PAGView.init(pagFile, canvas).then(function(pagView) {
          return { pagFile: pagFile, pagView: pagView };
        });
      }).then(function(result) {
        var pagFile = result.pagFile;
        var pagView = result.pagView;
        // 获取动画设置
        var animSettings = null;
        try {
          var settingsStr = container.getAttribute('data-anim-settings');
          if (settingsStr) animSettings = JSON.parse(settingsStr);
        } catch(e) {
          console.warn('无法解析动画设置:', e);
        }
        
        // 应用入点延迟
        if (inPoint > 0) {
          setTimeout(function() {
            applyPAGAnimationSettings(pagView, pagFile, animSettings);
          }, inPoint * 1000);
        } else {
          applyPAGAnimationSettings(pagView, pagFile, animSettings);
        }
        
        resolve({ success: true, canvas: canvas, pagView: pagView });
      }).catch(function(e) {
        console.error('PAG文件加载失败:', src, e);
        showFileError(container, 'PAG文件加载失败: ' + e.message);
        resolve({ success: false, error: e });
      });
    });
  }
  
  function applyPAGAnimationSettings(pagView, pagFile, animSettings) {
    if (!animSettings) {
      // 默认播放一次
      pagView.setRepeatCount(1);
      pagView.play();
      return;
    }
    
    console.log('应用PAG动画设置:', animSettings);
    
    // 根据动画设置应用不同的播放模式
    switch(animSettings.loopMode) {
      case 'none':
        // 播放一次
        pagView.setRepeatCount(1);
        pagView.play();
        break;
      case 'loop':
        // 全时长循环
        pagView.setRepeatCount(0); // 0表示无限循环
        pagView.play();
        break;
      case 'pingpong':
        // 全时长弹跳循环
        pagView.setRepeatCount(0);
        // PAG需要自定义pingpong逻辑
        setupPAGPingPong(pagView, 0, 100);
        pagView.play();
        break;
      case 'loopRange':
        if (animSettings.range) {
          var range = animSettings.range;
          if (range.isTwoPart) {
            // 仅范围循环: loopRange(60-100)
            var startProgress = range.start / 100;
            var endProgress = range.end / 100;
            pagView.setProgress(startProgress);
            pagView.setRepeatCount(0);
            // 设置范围循环需要自定义
            setupPAGRangeLoop(pagView, startProgress, endProgress);
          } else {
            // 播放一次+循环: loopRange(0-60-100)
            var firstEndProgress = range.middle / 100;
            var loopStartProgress = range.middle / 100;
            var loopEndProgress = range.end / 100;
            // 先播放一次第一部分
            pagView.setProgress(0);
            pagView.play();
            // 监听播放完成，然后开始循环第二部分
            pagView.onAnimationEnd = function() {
              pagView.setProgress(loopStartProgress);
              pagView.setRepeatCount(0);
              setupPAGRangeLoop(pagView, loopStartProgress, loopEndProgress);
              pagView.play();
            };
          }
        } else {
          // 默认播放一次
          pagView.setRepeatCount(1);
          pagView.play();
        }
        break;
      case 'pingpongRange':
        if (animSettings.range) {
          var range = animSettings.range;
          if (range.isTwoPart) {
            // 仅范围弹跳循环: pingpongRange(60-100)
            var startProgress = range.start / 100;
            var endProgress = range.end / 100;
            pagView.setProgress(startProgress);
            pagView.setRepeatCount(0);
            setupPAGPingPong(pagView, startProgress, endProgress);
            pagView.play();
          } else {
            // 播放一次+弹跳循环: pingpongRange(0-60-100)
            var firstEndProgress = range.middle / 100;
            var loopStartProgress = range.middle / 100;
            var loopEndProgress = range.end / 100;
            // 先播放一次第一部分
            pagView.setProgress(0);
            pagView.play();
            // 监听播放完成，然后开始弹跳循环第二部分
            pagView.onAnimationEnd = function() {
              pagView.setProgress(loopStartProgress);
              pagView.setRepeatCount(0);
              setupPAGPingPong(pagView, loopStartProgress, loopEndProgress);
              pagView.play();
            };
          }
        } else {
          // 默认播放一次
          pagView.setRepeatCount(1);
          pagView.play();
        }
        break;
      default:
        // 默认播放一次
        pagView.setRepeatCount(1);
        pagView.play();
    }
  }
  
  function setupPAGRangeLoop(pagView, startProgress, endProgress) {
    // 设置PAG范围循环
    var direction = 1;
    var currentProgress = startProgress;
    
    var updateProgress = function() {
      if (!pagView) return;
      
      currentProgress += 0.01 * direction;
      
      if (direction > 0 && currentProgress >= endProgress) {
        currentProgress = startProgress;
      } else if (direction < 0 && currentProgress <= startProgress) {
        currentProgress = endProgress;
      }
      
      pagView.setProgress(currentProgress);
      
      requestAnimationFrame(updateProgress);
    };
    
    updateProgress();
  }
  
  function setupPAGPingPong(pagView, startProgress, endProgress) {
    // 设置PAG弹跳循环
    var direction = 1;
    var currentProgress = startProgress;
    
    var updateProgress = function() {
      if (!pagView) return;
      
      currentProgress += 0.01 * direction;
      
      if (currentProgress >= endProgress) {
        direction = -1;
        currentProgress = endProgress;
      } else if (currentProgress <= startProgress) {
        direction = 1;
        currentProgress = startProgress;
      }
      
      pagView.setProgress(currentProgress);
      
      requestAnimationFrame(updateProgress);
    };
    
    updateProgress();
  }
  function loadLottieAnimations() {
    console.log('开始加载Lottie动画...');
    if (typeof lottie === 'undefined') {
      console.error('Lottie库未加载');
      showLibraryError('Lottie');
      return;
    }
    console.log('Lottie库已加载');
    var lottieWrappers = document.querySelectorAll('.lottie-wrapper[data-src]');
    console.log('找到' + lottieWrappers.length + '个Lottie容器');
    var loadPromises = [];
    for (var j = 0; j < lottieWrappers.length; j++) {
      (function(wrapper) {
        var promise = new Promise(function(resolve, reject) {
          try {
            var jsonPath = wrapper.getAttribute('data-src');
            var inPoint = parseFloat(wrapper.getAttribute('data-in-point')) || 0;
            console.log('加载Lottie文件:', jsonPath, '入点:', inPoint);
            fetch(jsonPath, { method: 'HEAD' }).then(function(response) {
              if (!response.ok) {
                console.warn('Lottie文件不存在或无法访问: ' + jsonPath);
                showFileError(wrapper.parentElement, 'Lottie文件不存在: ' + jsonPath);
              }
              return fetch(jsonPath);
            }).then(function(response) {
              if (!response.ok) throw new Error('无法加载Lottie文件，HTTP状态: ' + response.status);
              return response.json();
            }).then(function(animationData) {
              if (!animationData) throw new Error('Lottie数据为空');
              // 修复图片资源路径
              if (animationData.assets) {
                for (var k = 0; k < animationData.assets.length; k++) {
                  var asset = animationData.assets[k];
                  if (asset.p && asset.u) {
                    // 确保资源路径正确
                    if (asset.u === '' || asset.u === './') {
                      asset.u = 'assets/images/';
                    } else if (!asset.u.startsWith('http') && !asset.u.startsWith('/')) {
                      asset.u = 'assets/images/' + asset.u;
                    }
                  }
                }
              }
              var container = document.createElement('div');
              container.className = 'lottie-container';
              wrapper.appendChild(container);
              var animSettings = null;
              try {
                var parentLayer = wrapper.closest('[data-anim-settings]');
                if (parentLayer) {
                  var settingsStr = parentLayer.getAttribute('data-anim-settings');
                  if (settingsStr) animSettings = JSON.parse(settingsStr);
                }
              } catch(e) { console.warn('无法解析动画设置:', e); }
              
              var anim = lottie.loadAnimation({
                container: container,
                renderer: 'svg',
                loop: false,
                autoplay: false,
                animationData: animationData,
                assetsPath: 'assets/images/'
              });
              anim.addEventListener('DOMLoaded', function() {
                console.log('Lottie动画DOM加载完成:', jsonPath);
                
                // 应用入点延迟
                if (inPoint > 0) {
                  setTimeout(function() {
                    applyLottieAnimationSettings(anim, animSettings);
                  }, inPoint * 1000);
                } else {
                  applyLottieAnimationSettings(anim, animSettings);
                }
                
                resolve({ success: true, anim: anim });
              });
              anim.addEventListener('data_failed', function(e) {
                console.error('Lottie数据加载失败:', jsonPath, e);
                showFileError(wrapper.parentElement, 'Lottie数据加载失败');
                resolve({ success: false, error: e });
              });
              setTimeout(function() {
                if (anim.isLoaded === undefined || !anim.isLoaded) {
                  console.warn('Lottie加载超时:', jsonPath);
                }
              }, 10000);
            }).catch(function(e) {
              console.error('Lottie加载失败:', jsonPath, e);
              showFileError(wrapper.parentElement, 'Lottie加载失败: ' + e.message);
              resolve({ success: false, error: e });
            });
          } catch(e) { 
            console.error('Lottie加载异常:', e);
            resolve({ success: false, error: e });
          }
        });
        loadPromises.push(promise);
      })(lottieWrappers[j]);
    }
    Promise.allSettled(loadPromises).then(function(results) {
      var successCount = 0, failCount = 0;
      results.forEach(function(result, index) {
        if (result.status === 'fulfilled' && result.value.success) successCount++;
        else { failCount++; console.error('Lottie文件加载失败:', result.reason || '未知错误'); }
      });
      console.log('Lottie文件加载完成: ' + successCount + ' 个成功, ' + failCount + ' 个失败');
    });
  }
  
  function applyLottieAnimationSettings(anim, animSettings) {
    if (!animSettings) {
      // 默认播放一次
      anim.loop = false;
      anim.play();
      return;
    }
    
    console.log('应用Lottie动画设置:', animSettings);
    
    // 根据动画设置应用不同的播放模式
    switch(animSettings.loopMode) {
      case 'none':
        // 播放一次
        anim.loop = false;
        anim.play();
        break;
      case 'loop':
        // 全时长循环
        anim.loop = true;
        anim.play();
        break;
      case 'pingpong':
        // 全时长弹跳循环
        anim.loop = false;
        var direction = 1;
        anim.setDirection(direction);
        anim.play();
        
        // 监听动画完成事件，实现pingpong
        anim.addEventListener('complete', function() {
          direction = direction === 1 ? -1 : 1;
          anim.setDirection(direction);
          anim.play();
        });
        break;
      case 'loopRange':
        if (animSettings.range) {
          var range = animSettings.range;
          if (range.isTwoPart) {
            // 仅范围循环: loopRange(60-100)
            var startFrame = Math.floor(anim.totalFrames * range.start / 100);
            var endFrame = Math.floor(anim.totalFrames * range.end / 100);
            anim.loop = true;
            anim.playSegments([startFrame, endFrame], true);
          } else {
            // 播放一次+循环: loopRange(0-60-100)
            var firstEndFrame = Math.floor(anim.totalFrames * range.middle / 100);
            var loopStartFrame = Math.floor(anim.totalFrames * range.middle / 100);
            var loopEndFrame = Math.floor(anim.totalFrames * range.end / 100);
            
            // 先播放一次第一部分
            anim.playSegments([0, firstEndFrame], true);
            
            // 监听播放完成，然后开始循环第二部分
            anim.addEventListener('complete', function onFirstPartComplete() {
              anim.removeEventListener('complete', onFirstPartComplete);
              anim.loop = true;
              anim.playSegments([loopStartFrame, loopEndFrame], true);
            });
          }
        } else {
          // 默认播放一次
          anim.loop = false;
          anim.play();
        }
        break;
      case 'pingpongRange':
        if (animSettings.range) {
          var range = animSettings.range;
          if (range.isTwoPart) {
            // 仅范围弹跳循环: pingpongRange(60-100)
            var startFrame = Math.floor(anim.totalFrames * range.start / 100);
            var endFrame = Math.floor(anim.totalFrames * range.end / 100);
            anim.loop = false;
            var direction = 1;
            anim.playSegments([startFrame, endFrame], true);
            
            // 监听动画完成事件，实现pingpong
            anim.addEventListener('complete', function() {
              direction = direction === 1 ? -1 : 1;
              anim.setDirection(direction);
              anim.playSegments([startFrame, endFrame], true);
            });
          } else {
            // 播放一次+弹跳循环: pingpongRange(0-60-100)
            var firstEndFrame = Math.floor(anim.totalFrames * range.middle / 100);
            var loopStartFrame = Math.floor(anim.totalFrames * range.middle / 100);
            var loopEndFrame = Math.floor(anim.totalFrames * range.end / 100);
            
            // 先播放一次第一部分
            anim.playSegments([0, firstEndFrame], true);
            
            // 监听播放完成，然后开始弹跳循环第二部分
            anim.addEventListener('complete', function onFirstPartComplete() {
              anim.removeEventListener('complete', onFirstPartComplete);
              anim.loop = false;
              var direction = 1;
              anim.playSegments([loopStartFrame, loopEndFrame], true);
              
              // 监听动画完成事件，实现pingpong
              anim.addEventListener('complete', function() {
                direction = direction === 1 ? -1 : 1;
                anim.setDirection(direction);
                anim.playSegments([loopStartFrame, loopEndFrame], true);
              });
            });
          }
        } else {
          // 默认播放一次
          anim.loop = false;
          anim.play();
        }
        break;
      default:
        // 默认播放一次
        anim.loop = false;
        anim.play();
    }
  }
  function showFileError(container, message) {
    var existingError = container.querySelector('.file-error');
    if (existingError) existingError.remove();
    var errorDiv = document.createElement('div');
    errorDiv.className = 'file-error';
    errorDiv.innerHTML = '<h4>文件加载失败</h4>' +
                        '<p>' + message + '</p>' +
                        '<p>请检查文件是否存在且路径正确</p>' +
                        '<p>或使用正确的导出插件重新导出</p>';
    if (container) container.appendChild(errorDiv);
  }
  
  function showLibraryError(libName) {
    var containers = document.querySelectorAll('[data-file-type]');
    for (var i = 0; i < containers.length; i++) {
      var container = containers[i];
      var fileType = container.getAttribute('data-file-type');
      if (fileType === libName.toLowerCase()) showFileError(container, libName + '库未加载或加载失败');
    }
  }
  window.addEventListener('load', function() {
    console.log('页面加载完成，开始初始化动画...');
    loadStatus.textContent = '正在初始化...';
    loadAnimationLibraries().then(function(results) {
      console.log('所有库加载完成');
      loadStatus.textContent = '库加载完成，开始加载动画...';
      setTimeout(function() {
        loadPAGAnimations();
        loadLottieAnimations();
        loadStatus.textContent = '动画加载完成';
        setTimeout(function() { loadStatus.textContent = ''; }, 2000);
        console.log('动画初始化完成');
      }, 500);
    }).catch(function(e) {
      console.error('库加载失败:', e);
      loadStatus.textContent = '库加载失败，请检查网络或本地库文件';
    });
  });
  document.addEventListener('click', function(e) {
    var target = e.target;
    var layer = target.closest('.layer[data-link]');
    if (layer) {
      e.stopPropagation();
      var link = layer.getAttribute('data-link');
      if (link && link.trim() !== '') {
        if (link === '../') {
          // 返回上一级目录
          var currentPath = window.location.pathname;
          var parentPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
          if (parentPath === '') parentPath = '/';
          window.location.href = parentPath;
        } else {
          window.location.href = link;
        }
      }
    }
  });
})();
